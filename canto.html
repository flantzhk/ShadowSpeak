const fbAuth = firebase.auth();
const fbDb = firebase.firestore();

// Firestore helpers for progress sync
const CANTO_COLLECTION = "canto-progress";
async function loadFromFirestore(uid) {
  try {
    const doc = await fbDb.collection(CANTO_COLLECTION).doc(uid).get();
    return doc.exists ? doc.data() : null;
  } catch(e) { console.warn("Firestore load failed, using local:", e); return null; }
}
async function saveToFirestore(uid, data) {
  try { await fbDb.collection(CANTO_COLLECTION).doc(uid).set(data, { merge: true }); }
  catch(e) { console.warn("Firestore save failed:", e); }
}
async function loadSettingsFromFirestore(uid) {
  try {
    const doc = await fbDb.collection("settings").doc(uid + "-canto").get();
    return doc.exists ? doc.data() : null;
  } catch(e) { return null; }
}
async function saveSettingsToFirestore(uid, data) {
  try { await fbDb.collection("settings").doc(uid + "-canto").set(data); }
  catch(e) { console.warn("Settings save failed:", e); }
}

    { en: "I'd like two fish please", jyut: "m4 goi1 jiu3 loeng5 tiu4 jyu2", cn: "唔該要兩條魚", tag: "You order" },
    { en: "Can you help me cut it up?", jyut: "ho2 m4 ho2 ji5 bong1 ngo5 cit3 hoi1", cn: "可唔可以幫我切開？", tag: "You ask" },
    { en: "Do you want the head and tail?", jyut: "jiu3 m4 jiu3 jyu4 tau4 jyu4 mei5", cn: "要唔要魚頭魚尾？", tag: "Vendor asks" },
    { en: "No thanks, just the middle", jyut: "m4 jiu3, jiu3 zung1 gaan1 go2 dou6", cn: "唔要，要中間嗰度", tag: "You reply" },
    { en: "Anything else?", jyut: "zung6 jiu3 me1", cn: "仲要咩？", tag: "Vendor asks" },
    { en: "That's enough, thank you", jyut: "gau3 laa3, m4 goi1", cn: "夠喇，唔該", tag: "Done" },
    { en: "How much is it altogether?", jyut: "jat1 gung6 gei2 do1 cin2", cn: "一共幾多錢？", tag: "Paying" },
    { en: "Sixty-five dollars", jyut: "luk6 sap6 ng5 man1", cn: "六十五蚊", tag: "Vendor replies" },
    { en: "I don't need a bag, thank you", jyut: "m4 sai2 doi6, m4 goi1", cn: "唔使袋，唔該", tag: "Eco" },
    { en: "Can you make it a bit cheaper?", jyut: "peng4 di1 dak1 m4 dak1", cn: "平啲得唔得？", tag: "Bargaining" },
    { en: "Okay, I'll give you a discount", jyut: "hou2 laa1, peng4 di1 bei2 nei5", cn: "好啦，平啲俾你", tag: "Vendor agrees" },
    { en: "Can I help you?", jyut: "jau5 me1 ho2 ji5 bong1 dou3 nei5", cn: "有咩可以幫到你？", tag: "Staff asks" },
    { en: "I'm just looking, thanks", jyut: "ngo5 tai2 haa5 sin1, m4 goi1", cn: "我睇吓先，唔該", tag: "You reply" },
    { en: "I'd like this one please", jyut: "ngo5 jiu3 ni1 go3, m4 goi1", cn: "我要呢個，唔該", tag: "Choosing" },
    { en: "Do you have this in medium?", jyut: "ni1 go3 jau5 mou5 zung1 maa5", cn: "呢個有冇中碼？", tag: "Size" },
    { en: "Do you have this in small?", jyut: "ni1 go3 jau5 mou5 sai3 maa5", cn: "呢個有冇細碼？", tag: "Size" },
    { en: "Do you have this in large?", jyut: "ni1 go3 jau5 mou5 daai6 maa5", cn: "呢個有冇大碼？", tag: "Size" },
    { en: "Let me check for you", jyut: "ngo5 bong1 nei5 tai2 haa5", cn: "我幫你睇吓", tag: "Staff replies" },
    { en: "Sorry, we only have large left", jyut: "deoi3 m4 zyu6, zing6 faan1 daai6 maa5 ze1", cn: "對唔住，淨返大碼啫", tag: "Staff replies" },
    { en: "Can I try this on?", jyut: "ho2 m4 ho2 ji5 si3 haa5", cn: "可唔可以試吓？", tag: "You ask" },
    { en: "The fitting room is over there", jyut: "si3 san1 sat1 hai2 go2 bin1", cn: "試身室喺嗰邊", tag: "Staff points" },
    { en: "Do you have this in another colour?", jyut: "ni1 go3 jau5 mou5 dai6 ji6 go3 sik1", cn: "呢個有冇第二個色？", tag: "You ask" },
    { en: "Is this on sale?", jyut: "ni1 go3 jau5 mou5 gaam2 gaa3", cn: "呢個有冇減價？", tag: "You ask" },
    { en: "How much is it altogether?", jyut: "jat1 gung6 gei2 do1 cin2", cn: "一共幾多錢？", tag: "You ask" },
    { en: "That's two hundred and eighty dollars", jyut: "ji6 baak3 baat3 sap6 man1", cn: "二百八十蚊", tag: "Cashier" },
    { en: "How would you like to pay?", jyut: "dim2 bei2 cin2", cn: "點俾錢？", tag: "Cashier asks" },
    { en: "I'll pay by Octopus card", jyut: "ngo5 baat3 daat6 tung1", cn: "我八達通", tag: "You reply" },
    { en: "I'll pay by credit card", jyut: "ngo5 luk1 kaat1", cn: "我碌卡", tag: "You reply" },
    { en: "Do you need a bag?", jyut: "jiu3 m4 jiu3 doi6", cn: "要唔要袋？", tag: "Cashier asks" },
    { en: "Yes please", jyut: "jiu3, m4 goi1", cn: "要，唔該", tag: "You reply" },
    { en: "No thanks, I've got one", jyut: "m4 sai2, ngo5 jau5", cn: "唔使，我有", tag: "You reply" },
  ]},
  { id: 8, title: "Managing Home", scene: "Helper, building management, repairs, deliveries", phrases: [
    { en: "Can you clean the bathroom today?", jyut: "m4 goi1 gam1 jat6 caat3 haa5 sai2 sau2 gaan1", cn: "唔該今日擦吓洗手間", tag: "Request" },
    { en: "Okay, no problem", jyut: "hou2, mou5 man6 tai4", cn: "好，冇問題", tag: "Helper replies" },
    { en: "Can you mop the kitchen floor?", jyut: "m4 goi1 tong4 cyu4 fong2 dei6 haa5", cn: "唔該唞廚房地吓", tag: "Request" },
    { en: "Please change the bed sheets", jyut: "m4 goi1 wun6 cong4 daan1", cn: "唔該換床單", tag: "Request" },
    { en: "We've run out of washing liquid", jyut: "sai2 jit6 zing1 mou5 saai3 laa3", cn: "洗潔精冇晒喇", tag: "Telling" },
    { en: "I'll go and buy some", jyut: "ngo5 heoi3 maai5", cn: "我去買", tag: "Helper replies" },
    { en: "Can you iron these clothes?", jyut: "m4 goi1 tong3 haa5 ni1 di1 saam1", cn: "唔該熨吓呢啲衫", tag: "Request" },
    { en: "Please don't put this in the dryer", jyut: "ni1 gin6 m4 hou2 fong3 gon1 ji1 gei1", cn: "呢件唔好放乾衣機", tag: "Request" },
    { en: "Do you need me to buy anything?", jyut: "jiu3 m4 jiu3 ngo5 maai5 me1 je5", cn: "要唔要我買咩嘢？", tag: "Helper asks" },
    { en: "Yes, we need milk and eggs", jyut: "jiu3, ngo5 dei6 jiu3 naai5 tung4 gai1 daan2", cn: "要，我哋要奶同雞蛋", tag: "You reply" },
    { en: "No, we have everything", jyut: "m4 sai2 laa3, me1 dou1 jau5", cn: "唔使喇，咩都有", tag: "You reply" },
    { en: "Hi, I'm from flat 12B", jyut: "nei5 hou2, ngo5 hai6 sap6 ji6 B", cn: "你好，我係十二B", tag: "You identify" },
    { en: "The air conditioning in the bedroom isn't working", jyut: "fong2 ge3 laang5 hei3 waai6 zo2", cn: "房嘅冷氣壞咗", tag: "Reporting" },
    { en: "There's a leak in the kitchen", jyut: "cyu4 fong2 lau4 seoi2", cn: "廚房漏水", tag: "Reporting" },
    { en: "The wifi has stopped working", jyut: "wifi tyun5 zo2", cn: "WiFi斷咗", tag: "Reporting" },
    { en: "When did it start?", jyut: "gei2 si4 hoi1 ci2 gaa3", cn: "幾時開始㗎？", tag: "Management asks" },
    { en: "Since this morning", jyut: "gam1 ziu1 hoi1 ci2", cn: "今朝開始", tag: "You reply" },
    { en: "Since yesterday", jyut: "cam4 jat6 hoi1 ci2", cn: "尋日開始", tag: "You reply" },
    { en: "We'll send someone to take a look", jyut: "ngo5 dei6 wui5 paai3 jan4 lei4 tai2 haa5", cn: "我哋會派人嚟睇吓", tag: "Management replies" },
    { en: "When can they come?", jyut: "gei2 si4 ho2 ji5 lei4", cn: "幾時可以嚟？", tag: "You ask" },
    { en: "Thank you, I'll be home all day", jyut: "m4 goi1, ngo5 cing4 jat6 hai2 uk1 kei2", cn: "唔該，我成日喺屋企", tag: "You reply" },
    { en: "Hello, I need someone to fix my air conditioning", jyut: "wai2, ngo5 jiu3 jan4 lei4 sau1 laang5 hei3", cn: "喂，我要人嚟修冷氣", tag: "You call" },
    { en: "What's the problem?", jyut: "me1 man6 tai4", cn: "咩問題？", tag: "Repairman asks" },
    { en: "It's making a strange noise", jyut: "keoi5 faat3 ceot1 gwai1 gwai1 dei2 ge3 seng1", cn: "佢發出怪怪哋嘅聲", tag: "You reply" },
    { en: "It's not cooling", jyut: "m4 dung3 aa3", cn: "唔凍呀", tag: "You reply" },
    { en: "It's leaking water", jyut: "lau4 seoi2", cn: "漏水", tag: "You reply" },
    { en: "I can come tomorrow afternoon", jyut: "ngo5 ting1 jat6 haa6 zau3 lei4 dak1", cn: "我聽日下晝嚟得", tag: "Repairman says" },
    { en: "Okay, that works", jyut: "hou2 aa3, dak1", cn: "好呀，得", tag: "You reply" },
    { en: "How much will it cost?", jyut: "daai6 koi3 gei2 do1 cin2", cn: "大概幾多錢？", tag: "You ask" },
    { en: "I'll need to take a look first", jyut: "ngo5 jiu3 tai2 zo2 sin1 zi3 zi1", cn: "我要睇咗先至知", tag: "Repairman replies" },
    { en: "Delivery!", jyut: "sung3 fo3!", cn: "送貨！", tag: "Delivery person" },
    { en: "Please come up", jyut: "soeng5 lei4 laa1", cn: "上嚟啦", tag: "You reply" },
    { en: "Please leave it at the door", jyut: "m4 goi1 fong3 hai2 mun4 hau2", cn: "唔該放喺門口", tag: "You reply" },
    { en: "Which flat?", jyut: "gei2 lau2 gei2 hou6", cn: "幾樓幾號？", tag: "Delivery asks" },
    { en: "Twelve B", jyut: "sap6 ji6 lau2 B", cn: "十二樓B", tag: "You reply" },
    { en: "Please sign here", jyut: "m4 goi1 hai2 ni1 dou6 cim1 meng2", cn: "唔該喺呢度簽名", tag: "Delivery says" },
    { en: "Thank you!", jyut: "m4 goi1!", cn: "唔該！", tag: "You reply" },
    { en: "Hurry up! We're going to be late!", jyut: "faai3 di1 laa1, ci4 dou3 laa3", cn: "快啲啦，遲到喇", tag: "Rushing kids" },
    { en: "Stop fighting! (to kids)", jyut: "m4 hou2 zaang1 laa1", cn: "唔好爭啦", tag: "To kids" },
    { en: "Did you eat yet? (casual check-in)", jyut: "nei5 sik6 zo2 faan6 mei6", cn: "你食咗飯未？", tag: "Casual care" },
    { en: "I'm home! (announcing arrival)", jyut: "ngo5 faan1 lei4 laa3", cn: "我返嚟喇", tag: "Arriving home" },
  ]},
  { id: 9, title: "What's the Plan?", scene: "Making plans, catching up, running late, checking in on a friend", phrases: [
    { en: "What are you doing this weekend?", jyut: "ni1 go3 zau1 mut6 nei5 zou6 me1", cn: "呢個週末你做咩？", tag: "Friend asks" },
    { en: "Nothing yet, why?", jyut: "mei6 jau5 je5 zou6 wo3, dim2 aa3", cn: "未有嘢做喎，點呀？", tag: "You reply" },
    { en: "We're going to the beach on Saturday", jyut: "ngo5 dei6 sing1 kei4 luk6 heoi3 hoi2 taan1", cn: "我哋星期六去海灘", tag: "You reply" },
    { en: "Do you want to have lunch together?", jyut: "jiu3 m4 jiu3 jat1 cai4 sik6 aan3", cn: "要唔要一齊食晏？", tag: "Friend suggests" },
    { en: "Sure! What time?", jyut: "hou2 aa3! gei2 dim2", cn: "好呀！幾點？", tag: "You reply" },
    { en: "How about twelve o'clock?", jyut: "sap6 ji6 dim2 hou2 m4 hou2", cn: "十二點好唔好？", tag: "They suggest" },
    { en: "That works for me", jyut: "ngo5 dak1 aa3", cn: "我得呀", tag: "You reply" },
    { en: "Sorry, I can't that day", jyut: "deoi3 m4 zyu6, go2 jat6 ngo5 m4 dak1", cn: "對唔住，嗰日我唔得", tag: "You reply" },
    { en: "How about next week instead?", jyut: "haa6 go3 lai5 baai3 dak1 m4 dak1", cn: "下個禮拜得唔得？", tag: "You suggest" },
    { en: "What did you do yesterday?", jyut: "nei5 cam4 jat6 zou6 zo2 me1", cn: "你尋日做咗咩？", tag: "Friend asks" },
    { en: "I went to the cinema last night", jyut: "ngo5 cam4 maan5 heoi3 zo2 tai2 hei3", cn: "我尋晚去咗睇戲", tag: "You reply" },
    { en: "We went to Lantau Island last week", jyut: "soeng6 go3 lai5 baai3 ngo5 dei6 heoi3 zo2 daai6 jyu4 saan1", cn: "上個禮拜我哋去咗大嶼山", tag: "You reply" },
    { en: "How was it?", jyut: "dim2 aa3", cn: "點呀？", tag: "Friend asks" },
    { en: "It was really fun!", jyut: "hou2 hou2 waan2 aa3!", cn: "好好玩呀！", tag: "You reply" },
    { en: "It was okay, nothing special", jyut: "maa4 maa2 dei2 laa1, mou5 me1 dak6 bit6", cn: "麻麻地啦，冇咩特別", tag: "You reply" },
    { en: "Tomorrow I'm going to see my friend", jyut: "ting1 jat6 ngo5 heoi3 gin3 pang4 jau5", cn: "聽日我去見朋友", tag: "Sharing" },
    { en: "Today I'm going to get my nails done", jyut: "gam1 jat6 ngo5 heoi3 zou6 zi2 gaap3", cn: "今日我去做指甲", tag: "Sharing" },
    { en: "Next month we're going to Bali", jyut: "haa6 go3 jyut6 ngo5 dei6 heoi3 Bali", cn: "下個月我哋去Bali", tag: "Sharing" },
    { en: "Oh nice! For how long?", jyut: "hou2 aa3! heoi3 gei2 noi6", cn: "好呀！去幾耐？", tag: "Friend asks" },
    { en: "About two weeks", jyut: "daai6 koi3 loeng5 go3 sing1 kei4 ze1", cn: "大概兩個星期啫", tag: "You reply" },
    { en: "I have a meeting at three o'clock", jyut: "ngo5 saam1 dim2 jau5 go3 wui2", cn: "我三點有個會", tag: "Schedule" },
    { en: "Where are you?", jyut: "nei5 hai2 bin1", cn: "你喺邊？", tag: "Friend asks" },
    { en: "Sorry, I'm going to be a bit late", jyut: "deoi3 m4 zyu6, ngo5 wui5 ci4 di1 dou3", cn: "對唔住，我會遲啲到", tag: "You reply" },
    { en: "I'll be there in about ten minutes", jyut: "ngo5 daai6 koi3 sap6 fan1 zung1 dou3", cn: "我大概十分鐘到", tag: "ETA" },
    { en: "No worries, take your time", jyut: "m4 gan2 jiu3, maan6 maan2 lei4", cn: "唔緊要，慢慢嚟", tag: "Friend replies" },
    { en: "Wait for me, I'll be quick", jyut: "dang2 ngo5, ngo5 hou2 faai3", cn: "等我，我好快", tag: "Hurrying" },
    { en: "How long will it take?", jyut: "jiu3 gei2 noi6", cn: "要幾耐？", tag: "Asking" },
    { en: "Not long, almost there", jyut: "m4 noi6, zik1 hak1 dou3", cn: "唔耐，即刻到", tag: "You reply" },
    { en: "Don't worry, everything will be okay", jyut: "m4 hou2 daam1 sam1, mou5 si6 ge3", cn: "唔好擔心，冇事嘅", tag: "Reassuring" },
    { en: "Are you feeling better now?", jyut: "nei5 ji4 gaa1 hou2 di1 mei6", cn: "你而家好啲未？", tag: "Friend checks in" },
    { en: "Much better, thank you", jyut: "hou2 do1 laa3, m4 goi1 saai3", cn: "好多喇，唔該晒", tag: "You reply" },
    { en: "Still not great, but getting there", jyut: "mei6 hou2 saai3, bat1 gwo3 hou2 gan2 laa3", cn: "未好晒，不過好緊喇", tag: "You reply" },
    { en: "I miss you so much", jyut: "ngo5 hou2 gwaa3 zyu6 nei5 aa3", cn: "我好掛住你呀", tag: "To a friend/family" },
  ]},
  { id: 10, title: "Something Went Wrong", scene: "Lost things, lost yourself, explaining to security", phrases: [
    { en: "Excuse me, I left my phone in the taxi", jyut: "m4 goi1, ngo5 loeng4 zo2 sau2 gei1 hai2 dik1 si2 dou6", cn: "唔該，我留咗手機喺的士度", tag: "Emergency" },
    { en: "Do you remember the taxi number?", jyut: "nei5 gei3 m4 gei3 dak1 dik1 si2 hou6 maa5", cn: "你記唔記得的士號碼？", tag: "Staff asks" },
    { en: "No, I didn't see it", jyut: "m4 gei3 dak1, ngo5 mou5 tai2 dou2", cn: "唔記得，我冇睇到", tag: "You reply" },
    { en: "Yes, I took a photo", jyut: "gei3 dak1, ngo5 jing2 zo2 soeng2", cn: "記得，我影咗相", tag: "You reply" },
    { en: "I lost my wallet", jyut: "ngo5 m4 gin3 zo2 ngan4 baau1", cn: "我唔見咗銀包", tag: "Emergency" },
    { en: "I think I left my bag at the restaurant", jyut: "ngo5 gok3 dak1 ngo5 loeng4 zo2 go3 doi2 hai2 caan1 teng1", cn: "我覺得我留咗個袋喺餐廳", tag: "You explain" },
    { en: "When did you last have it?", jyut: "nei5 zeoi3 hau6 gei2 si4 gin3 dou2", cn: "你最後幾時見到？", tag: "Staff asks" },
    { en: "About an hour ago", jyut: "daai6 koi3 jat1 go3 zung1 tau4 cin4", cn: "大概一個鐘頭前", tag: "You reply" },
    { en: "Just now, maybe ten minutes ago", jyut: "tau4 sin1, daai6 koi3 sap6 fan1 zung1 cin4", cn: "頭先，大概十分鐘前", tag: "You reply" },
    { en: "Can you help me check?", jyut: "ho2 m4 ho2 ji5 bong1 ngo5 tai2 haa5", cn: "可唔可以幫我睇吓？", tag: "You ask" },
    { en: "Let me check for you", jyut: "ngo5 bong1 nei5 tai2 haa5", cn: "我幫你睇吓", tag: "Staff replies" },
    { en: "Sorry, we haven't found it", jyut: "deoi3 m4 zyu6, ngo5 dei6 wan2 m4 dou2", cn: "對唔住，我哋搵唔到", tag: "Bad news" },
    { en: "Yes, someone handed it in", jyut: "jau5, jau5 jan4 gaau1 faan1 lei4", cn: "有，有人交返嚟", tag: "Good news" },
    { en: "Oh thank goodness! Thank you so much", jyut: "aai1 hou2 coi2! m4 goi1 saai3", cn: "哎好彩！唔該晒", tag: "Relief" },
    { en: "Excuse me, I'm lost", jyut: "m4 goi1, ngo5 dong6 sat1 zo2", cn: "唔該，我蕩失咗", tag: "You say" },
    { en: "I can't find the exit", jyut: "ngo5 wan2 m4 dou2 ceot1 hau2", cn: "我搵唔到出口", tag: "You say" },
    { en: "Which way is the MTR station?", jyut: "dei6 tit3 zaam6 hai2 bin1 bin6", cn: "地鐵站喺邊邊？", tag: "You ask" },
    { en: "It's that way, keep going straight", jyut: "hai2 go2 bin6, zik6 haang4", cn: "喺嗰邊，直行", tag: "Stranger replies" },
    { en: "Can you show me on the map?", jyut: "ho2 m4 ho2 ji5 hai2 dei6 tou4 soeng6 zi2 bei2 ngo5 tai2", cn: "可唔可以喺地圖上指俾我睇？", tag: "You ask" },
    { en: "I'm trying to get to Central", jyut: "ngo5 soeng2 heoi3 zung1 waan4", cn: "我想去中環", tag: "You say" },
    { en: "You need to go back the other way", jyut: "nei5 jiu3 zyun3 tau4 haang4 faan1 zyun3", cn: "你要轉頭行返轉", tag: "Stranger replies" },
    { en: "Thank you so much for your help", jyut: "m4 goi1 saai3, hou2 do1 ze6", cn: "唔該晒，好多謝", tag: "You reply" },
    { en: "Excuse me, I need help", jyut: "m4 goi1, ngo5 jiu3 bong1 mong4", cn: "唔該，我要幫忙", tag: "You say" },
    { en: "What happened?", jyut: "faat3 sang1 zo2 me1 si6", cn: "發生咗咩事？", tag: "Security asks" },
    { en: "Someone took my bag", jyut: "jau5 jan4 lo2 zo2 ngo5 go3 doi2", cn: "有人攞咗我個袋", tag: "You reply" },
    { en: "Can I use your phone to make a call?", jyut: "ho2 m4 ho2 ji5 je6 nei5 ge3 din6 waa2 daa2 go3 din6 waa2", cn: "可唔可以借你嘅電話打個電話？", tag: "You ask" },
    { en: "I need to call my husband", jyut: "ngo5 jiu3 daa2 bei2 ngo5 lou5 gung1", cn: "我要打俾我老公", tag: "You say" },
  ]},

  { id: 12, title: "Weather Talk", phrases: [

let _cantoVoice = null;
let _enVoice = null;

function findVoice() {
  if (!_cantoVoice) {
    const v = speechSynthesis.getVoices();
    _cantoVoice = v.find(x=>x.lang==="yue-HK")||v.find(x=>x.lang==="yue-Hant-HK")||v.find(x=>x.lang==="zh-HK"&&x.name.toLowerCase().includes("canton"))||v.find(x=>x.lang==="zh-HK")||null;
  }
  if (!_enVoice) {
    const v = speechSynthesis.getVoices();
    const enVoices = v.filter(x => x.lang.startsWith("en"));
    // Priority: friendly US female voices first, then Google, then any US, then anything
    // Explicitly avoid Daniel (British male) and other stuffy-sounding voices
    const tiers = [
      x => x.lang === "en-US" && /samantha|google.*female|google us/i.test(x.name),
      x => x.lang === "en-US" && /google/i.test(x.name),
      x => /samantha|ava|zoe|nicky|allison/i.test(x.name), // Apple female voices
      x => x.lang === "en-US" && /premium|enhanced|natural/i.test(x.name),
      x => x.lang === "en-US" && !/daniel|alex|fred|ralph/i.test(x.name), // any US, skip male
      x => x.lang === "en-US",
      x => x.lang === "en-AU", // Aussie over British
      x => true, // anything
    ];
    for (const test of tiers) {
      const match = enVoices.find(test);
      if (match) { _enVoice = match; break; }
    }
    if (!_enVoice) _enVoice = enVoices[0] || null;
  }
  return _cantoVoice;
}

// ---- SAFARI AUDIO UNLOCK ----
// iOS Safari blocks audio unless it's initiated from a user gesture.
// We unlock the AudioContext on the very first tap by playing a silent buffer.
// After that, all subsequent audio (MiniMax, Google TTS, system) plays fine.
let _audioCtx = null;
let _audioUnlocked = false;

function unlockAudio() {
  if (_audioUnlocked) return;
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    // Play a silent buffer
    const buf = _audioCtx.createBuffer(1, 1, 22050);
    const src = _audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(_audioCtx.destination);
    src.start(0);
    // Also unlock HTML5 Audio
    const silentAudio = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=");
    silentAudio.play().then(() => { silentAudio.pause(); }).catch(()=>{});
    _audioUnlocked = true;
    console.log("Audio unlocked for Safari");
  } catch(e) { console.log("Audio unlock failed:", e); }
}

// Attach to first user interaction
if (typeof document !== "undefined") {
  const unlockEvents = ["touchstart", "touchend", "mousedown", "click"];
  const handleUnlock = () => {
    unlockAudio();
    unlockEvents.forEach(e => document.removeEventListener(e, handleUnlock, true));
  };
  unlockEvents.forEach(e => document.addEventListener(e, handleUnlock, true));
}

function speakAsync(text, lang, rate=0.85) {
  return new Promise(resolve => {
    if ("speechSynthesis" in window) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = rate;
      if (lang === "yue-HK" || lang === "zh-HK") { if (_cantoVoice) u.voice = _cantoVoice; }
      else if (lang.startsWith("en")) { if (_enVoice) u.voice = _enVoice; u.pitch = 1.0; }
      u.onend = resolve;
      u.onerror = resolve;
      speechSynthesis.speak(u);
      setTimeout(resolve, Math.max(3000, text.length * 200));
    } else resolve();
  });
}

// Audio recording helpers — keeps mic stream alive to avoid repeated permission prompts
let _mediaRecorder = null;
let _audioChunks = [];
let _micStream = null;

async function getMicStream() {
  if (_micStream && _micStream.active) return _micStream;
  _micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return _micStream;
}

async function startRecording() {
  const stream = await getMicStream();
  _audioChunks = [];
  _mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
  _mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) _audioChunks.push(e.data); };
  _mediaRecorder.start();
  return true;
}

function stopRecording() {
  return new Promise((resolve) => {
    if (!_mediaRecorder || _mediaRecorder.state === "inactive") { resolve(null); return; }
    _mediaRecorder.onstop = () => {
      const blob = new Blob(_audioChunks, { type: "audio/webm" });
      // Don't stop tracks — keep stream alive for next recording
      resolve(blob);
    };
    _mediaRecorder.stop();
  });
}

function releaseMicStream() {
  if (_micStream) { _micStream.getTracks().forEach(t => t.stop()); _micStream = null; }
}

// ---- Spaced Repetition helpers ----
function getDueItems(progress) {
  const now = Date.now();
  const due = [];
  const phrases = progress.phrases || {};
  const phraseTimestamps = progress.phraseTs || {};
  UNITS.forEach(u => {
    u.phrases.forEach((p, i) => {
      const key = `${u.id}-${i}`;
      if (phrases[key]) {
        const ts = phraseTimestamps[key] || 0;
        const age = now - ts;
        const dayMs = 86400000;
        // Day 1-7: review daily. Week 2-4: every 3 days. Month 2+: weekly
        let interval;
        if (age < 7 * dayMs) interval = dayMs;
        else if (age < 28 * dayMs) interval = 3 * dayMs;
        else interval = 7 * dayMs;
        const lastReview = progress.lastReview?.[key] || ts;
        if (now - lastReview >= interval) due.push({ ...p, unitId: u.id, unitTitle: u.title, phraseIdx: i, key });
      }
    });
  });
  return due;
}

function getNewItems(progress) {
  const fresh = [];
  UNITS.forEach(u => {
    u.phrases.forEach((p, i) => {
      const key = `${u.id}-${i}`;
      if (!(progress.phrases || {})[key]) fresh.push({ ...p, unitId: u.id, unitTitle: u.title, phraseIdx: i, key });
    });
  });
  return fresh.slice(0, 10); // suggest 10 new per day
}

// ---- JYUTPING TONE MARKS ----
// Renders jyutping with visual tone contour lines instead of numbers
// Cantonese tones: 1=high level, 2=high rising, 3=mid level, 4=low falling, 5=low rising, 6=low level
const TONE_PATHS = {
  "1": "M0,2 L12,2",        // high level ˉ
  "2": "M0,10 L12,2",       // high rising ˊ
  "3": "M0,7 L12,7",        // mid level ˉ (mid)
  "4": "M0,4 L12,12",       // low falling ˋ
  "5": "M0,12 L12,6",       // low rising ˊ (low start)
  "6": "M0,12 L12,12",      // low level ˉ (low)
};

function ToneMark({ tone }) {
  const path = TONE_PATHS[tone];
  if (!path) return null;
  return React.createElement("svg", {
    width: 12, height: 14, viewBox: "0 0 12 14",
    style: { verticalAlign: "middle", opacity: 0.65, flexShrink: 0 }
  }, React.createElement("path", {
    d: path, stroke: "currentColor", strokeWidth: 2, fill: "none", strokeLinecap: "round"
  }));
}

function JyutpingTone({ text, className, style }) {
  if (!text) return null;
  const syllables = text.replace(/[，,!！?？。]/g, "").trim().split(/\s+/);
  return React.createElement("span", {
    className: className || "",
    style: { display: "inline-flex", flexWrap: "wrap", gap: "1px 8px", alignItems: "baseline", ...style }
  }, syllables.map((syl, i) => {
    const toneMatch = syl.match(/^([a-z]+)(\d)$/i);
    if (!toneMatch) return React.createElement("span", { key: i }, syl);
    const base = toneMatch[1];
    const tone = toneMatch[2];
    return React.createElement("span", {
      key: i,
      style: { display: "inline-flex", alignItems: "center", gap: 0 }
    },
      React.createElement("span", null, base + tone),
      React.createElement(ToneMark, { tone })
    );
  }));
}

// ---- QUIZ COMPONENTS ----
function QuizTab({ progress, upd }) {
  const [mode, setMode] = useState(null); // null | "production" | "dictation"
  const [quizItems, setQuizItems] = useState([]);
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState({ right: 0, almost: 0, wrong: 0 });
  const [done, setDone] = useState(false);
  const [dictAnswer, setDictAnswer] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreResult, setScoreResult] = useState(null);
  const [picking, setPicking] = useState(false); // unit picker mode
  const [selectedUnits, setSelectedUnits] = useState(new Set());
  const [source, setSource] = useState("known"); // "known" | "units" | "all"

  // Get known phrases for quizzing
  const knownPhrases = useMemo(() => {
    const items = [];
    UNITS.forEach(u => {
      u.phrases.forEach((p, i) => {
        const key = `${u.id}-${i}`;
        if ((progress.phrases || {})[key]) {
          items.push({ ...p, unitId: u.id, phraseIdx: i, key });
        }
      });
    });
    return items;
  }, [progress]);

  // Get all phrases from selected units
  const getUnitPhrases = () => {
    const items = [];
    UNITS.forEach(u => {
      if (selectedUnits.has(u.id)) {
        u.phrases.forEach((p, i) => {
          items.push({ ...p, unitId: u.id, phraseIdx: i, key: `${u.id}-${i}` });
        });
      }
    });
    return items;
  };

  const startQuiz = (m, src) => {
    let pool = [];
    if (src === "units") {
      pool = getUnitPhrases();
    } else if (src === "all") {
      pool = UNITS.flatMap(u => u.phrases.map((p, i) => ({ ...p, unitId: u.id, phraseIdx: i, key: `${u.id}-${i}` })));
    } else {
      pool = knownPhrases;
    }
    const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 20);
    setQuizItems(shuffled);
    setMode(m);
    setSource(src);
    setIdx(0);
    setRevealed(false);
    setScore({ right: 0, almost: 0, wrong: 0 });
    setDone(false);
    setDictAnswer("");
    setPicking(false);
  };

  const grade = (result) => {
    const item = quizItems[idx];
    if (result === "wrong" && source === "known") {
      upd(`phrases.${item.key}`, false);
    }
    setScore(prev => ({ ...prev, [result]: prev[result] + 1 }));
    setRevealed(false);
    setDictAnswer("");
    setScoreResult(null);
    if (idx + 1 >= quizItems.length) setDone(true);
    else setIdx(i => i + 1);
  };

  const toggleUnit = (id) => {
    setSelectedUnits(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  // Pronunciation scoring
  const qStartTest = async () => {
    stopAudio();
    try { const ok = await startRecording(); if (ok) setIsRecording(true); } catch(e) { console.warn("Mic error:", e); }
  };
  const qStopTest = async () => {
    setIsRecording(false);
    setScoring(true);
    const blob = await stopRecording();
    const ph = quizItems[idx];
    if (blob && ph) {
      try {
        const result = await scorePronunciation(blob, ph.cn, "cantonese");
        let chars = [];
        if (result.expectedJyutping && result.transcribedJyutping) {
          const expSyls = result.expectedJyutping.trim().split(/\s+/);
          const yourSyls = result.transcribedJyutping.trim().split(/\s+/);
          const cnChars = ph.cn.replace(/[，,。！？!?\s]/g, "").split("");
          for (let i = 0; i < Math.max(expSyls.length, cnChars.length); i++) {
            chars.push({ cn: cnChars[i] || "", e: expSyls[i] || "", y: yourSyls[i] || "", m: expSyls[i] === yourSyls[i] ? 1 : 0 });
          }
        }
        setScoreResult({ score: result.score, passed: result.passed, chars, phrase: ph });
      } catch(e) { console.error("Scoring error:", e); setScoreResult(null); }
    }
    setScoring(false);
  };

  // Unit picker screen
  if (picking) {
    const pickerMode = picking; // "production" or "dictation"
    const unitCount = selectedUnits.size;
    const phraseCount = getUnitPhrases().length;
    return (
      <div className="mc">
        <div className="pt">Pick units to quiz 📋</div>
        <div className="ps">Choose which units you want to practise. Tap to select, then start!</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,margin:"12px 0"}}>
          {UNITS.map(u => (
            <button key={u.id} onClick={()=>toggleUnit(u.id)} style={{padding:"8px 12px",borderRadius:10,border:selectedUnits.has(u.id)?"2px solid var(--lime)":"1.5px solid var(--st)",background:selectedUnits.has(u.id)?"rgba(196,240,0,.1)":"var(--wh)",cursor:"pointer",fontSize:".68rem",fontWeight:700,color:"var(--ink)"}}>
              {selectedUnits.has(u.id)?"✓ ":""}{u.id}. {u.title}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,margin:"8px 0"}}>
          <button onClick={()=>setSelectedUnits(new Set(UNITS.map(u=>u.id)))} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid var(--st)",background:"var(--wh)",fontSize:".65rem",fontWeight:700,color:"var(--ink)",cursor:"pointer"}}>Select all</button>
          <button onClick={()=>setSelectedUnits(new Set())} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid var(--st)",background:"var(--wh)",fontSize:".65rem",fontWeight:700,color:"var(--ink)",cursor:"pointer"}}>Clear</button>
        </div>
        {unitCount > 0 && (
          <div style={{textAlign:"center",margin:"12px 0"}}>
            <div style={{fontSize:".72rem",color:"var(--ink2)",marginBottom:8}}>{unitCount} unit{unitCount>1?"s":""} selected, {phraseCount} phrases</div>
            <button onClick={()=>startQuiz(pickerMode,"units")} style={{padding:"14px 28px",borderRadius:12,border:"none",background:"var(--lime)",color:"var(--for)",fontSize:".85rem",fontWeight:900,cursor:"pointer"}}>Start quiz with {Math.min(phraseCount,20)} phrases</button>
          </div>
        )}
        <button onClick={()=>setPicking(false)} style={{display:"block",margin:"12px auto 0",background:"none",border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,color:"var(--ink2)"}}>← Back</button>
      </div>
    );
  }

  if (!mode) {
    return (
      <div className="mc">
        <div className="pt">Quiz Time! 🎯</div>
        <div className="ps">Test what you've learned. You'll be surprised how much you know!</div>
        <div className="qs-card" onClick={() => startQuiz("production","known")} style={{opacity:knownPhrases.length<3?.4:1,pointerEvents:knownPhrases.length<3?"none":"auto"}}>
          <div style={{ fontSize: "2rem", marginBottom: 8 }}>🗣</div>
          <div className="qs-ti">Speaking Quiz</div>
          <div className="qs-sub">See the English, try to say it in Cantonese out loud, then check!</div>
        </div>
        <div className="qs-card" onClick={() => startQuiz("dictation","known")} style={{opacity:knownPhrases.length<3?.4:1,pointerEvents:knownPhrases.length<3?"none":"auto"}}>
          <div style={{ fontSize: "2rem", marginBottom: 8 }}>👂</div>
          <div className="qs-ti">Listening Quiz</div>
          <div className="qs-sub">Listen to Cantonese, then type what you think it means in English!</div>
        </div>
        <div style={{fontSize:".75rem",color:"var(--ink2)",textAlign:"center",marginTop:10,fontWeight:600}}>
          {knownPhrases.length >= 3 ? `${knownPhrases.length} known phrases ready to quiz 🎉` : `Mark at least 3 phrases as known to unlock quizzes above 💪`}
        </div>
        <div style={{borderTop:"1.5px solid var(--st)",margin:"16px 0 12px"}} />
        <div style={{fontSize:".72rem",fontWeight:800,color:"var(--ink)",marginBottom:8}}>Or pick specific units to quiz:</div>
        <div className="qs-card" onClick={() => setPicking("production")}>
          <div style={{ fontSize: "2rem", marginBottom: 8 }}>🎯</div>
          <div className="qs-ti">Speaking Quiz (pick units)</div>
          <div className="qs-sub">Choose exactly which units you want to practise speaking</div>
        </div>
        <div className="qs-card" onClick={() => setPicking("dictation")}>
          <div style={{ fontSize: "2rem", marginBottom: 8 }}>🎧</div>
          <div className="qs-ti">Listening Quiz (pick units)</div>
          <div className="qs-sub">Choose units and test your listening comprehension</div>
        </div>
        <button onClick={()=>startQuiz("production","all")} style={{width:"100%",marginTop:10,padding:"12px",borderRadius:12,border:"1.5px solid var(--st)",background:"var(--wh)",cursor:"pointer",fontSize:".75rem",fontWeight:700,color:"var(--ink)"}}>🔀 Random quiz from all {UNITS.reduce((s,u)=>s+u.phrases.length,0)} phrases</button>
      </div>
    );
  }

  if (done) {
    const total = score.right + score.almost + score.wrong;
    const pct = total ? Math.round(score.right / total * 100) : 0;
    return (
      <div className="comp-ov">
        <div className="comp-em">{pct >= 80 ? "🌟" : pct >= 50 ? "💪" : "📝"}</div>
        <div className="comp-t">{pct >= 80 ? "Amazing work!" : pct >= 50 ? "Great effort!" : "Good practice!"}</div>
        <div className="comp-s">{score.right}/{total} correct · {score.wrong > 0 ? `${score.wrong} sent back for more practice` : "nothing sent back! Wow!"}</div>
        <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
          <div style={{ background: "rgba(196,240,0,.15)", borderRadius: 10, padding: "10px 16px", textAlign: "center" }}>
            <div style={{ fontSize: "1.2rem", fontWeight: 900, color: "var(--lime)" }}>{score.right}</div>
            <div style={{ fontSize: ".52rem", color: "rgba(255,255,255,.4)", fontWeight: 700 }}>Got it</div>
          </div>
          <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 10, padding: "10px 16px", textAlign: "center" }}>
            <div style={{ fontSize: "1.2rem", fontWeight: 900, color: "#fff" }}>{score.almost}</div>
            <div style={{ fontSize: ".52rem", color: "rgba(255,255,255,.4)", fontWeight: 700 }}>Almost</div>
          </div>
          <div style={{ background: "rgba(240,90,58,.15)", borderRadius: 10, padding: "10px 16px", textAlign: "center" }}>
            <div style={{ fontSize: "1.2rem", fontWeight: 900, color: "var(--cor)" }}>{score.wrong}</div>
            <div style={{ fontSize: ".52rem", color: "rgba(255,255,255,.4)", fontWeight: 700 }}>Review</div>
          </div>
        </div>
        <button className="comp-btn" onClick={() => setMode(null)}>Done</button>
      </div>
    );
  }

  const item = quizItems[idx];

  if (mode === "production") {
    return (
      <div className="quiz-ov">
        <div className="quiz-hd">
          <button className="quiz-cl" onClick={() => {setMode(null);setScoreResult(null);}}>✕ End quiz</button>
          <div className="quiz-ti">🗣 Speaking Quiz</div>
          <div style={{ fontSize: ".65rem", color: "rgba(255,255,255,.4)" }}>{idx + 1}/{quizItems.length}</div>
        </div>
        <div className="quiz-body">
          <div className="quiz-sub">Say this in Cantonese. Take your time!</div>
          <div className="quiz-prompt">{item.en}</div>
          {!revealed ? (
            <button className="quiz-reveal-btn" onClick={() => setRevealed(true)}>Reveal answer</button>
          ) : (
            <>
              <div className="quiz-answer">
                <div className="quiz-ans-jy"><JyutpingTone text={item.jyut} /></div>
                <div className="quiz-ans-cn">{item.cn}</div>
                <button style={{ marginTop: 8, background: "var(--for)", border: "none", borderRadius: 999, padding: "6px 14px", fontSize: ".62rem", cursor: "pointer", color: "var(--lime)", fontWeight: 700 }} onClick={() => speak(item.cn)}>▶ Listen to it</button>
              </div>
              {/* Pronunciation scoring */}
              <div style={{width:"100%",maxWidth:440,marginBottom:8}}>
                {!isRecording && !scoring ? (
                  <button onClick={qStartTest} style={{width:"100%",padding:"12px",borderRadius:12,border:"2px solid var(--lime)",background:"rgba(196,240,0,.08)",color:"var(--lime)",fontSize:".78rem",fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    🎙 Test your pronunciation
                  </button>
                ) : scoring ? (
                  <div style={{width:"100%",padding:"12px",borderRadius:12,background:"rgba(255,255,255,.06)",textAlign:"center"}}>
                    <div style={{fontSize:".75rem",fontWeight:700,color:"rgba(255,255,255,.5)"}}>Scoring your pronunciation...</div>
                  </div>
                ) : (
                  <button onClick={qStopTest} style={{width:"100%",padding:"12px",borderRadius:12,border:"2px solid #e74c3c",background:"rgba(231,76,60,.12)",color:"#ff7a5c",fontSize:".78rem",fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,animation:"pulse 1s ease-in-out infinite"}}>
                    ⏹ Stop recording & score
                  </button>
                )}
              </div>
              <div style={{ fontSize: ".68rem", color: "var(--ink3)", marginBottom: 8 }}>How did you do?</div>
              <div className="quiz-grade">
                <button className="quiz-g-btn quiz-g-yes" onClick={() => grade("right")}>✓ Got it</button>
                <button className="quiz-g-btn quiz-g-almost" onClick={() => grade("almost")}>~ Almost</button>
                <button className="quiz-g-btn quiz-g-no" onClick={() => grade("wrong")}>✗ Nope</button>
              </div>
            </>
          )}
          <div className="quiz-score">{score.right} correct · {score.wrong} sent back for review</div>
        </div>
        {scoreResult && <PronunciationScore
          score={scoreResult.score} chars={scoreResult.chars} phrase={scoreResult.phrase}
          onRetry={() => { setScoreResult(null); qStartTest(); }}
          onNext={() => { setScoreResult(null); }}
          onClose={() => { setScoreResult(null); }}
        />}
      </div>
    );
  }

  if (mode === "dictation") {
    return (
      <div className="quiz-ov">
        <div className="quiz-hd">
          <button className="quiz-cl" onClick={() => setMode(null)}>✕ End quiz</button>
          <div className="quiz-ti">👂 Listening</div>
          <div style={{ fontSize: ".65rem", color: "rgba(255,255,255,.4)" }}>{idx + 1}/{quizItems.length}</div>
        </div>
        <div className="quiz-body">
          <div className="quiz-sub">Listen carefully, then type what it means:</div>
          <button className="quiz-play-btn" onClick={() => speak(item.cn)}>▶</button>
          {!revealed ? (
            <>
              <input className="quiz-input" placeholder="Type the English meaning..." value={dictAnswer} onChange={e => setDictAnswer(e.target.value)} onKeyDown={e => e.key === "Enter" && setRevealed(true)} />
              <button className="quiz-reveal-btn" onClick={() => setRevealed(true)}>Check my answer</button>
            </>
          ) : (
            <>
              <div className="quiz-answer">
                <div className="quiz-ans-en">{item.en}</div>
                <div className="quiz-ans-jy"><JyutpingTone text={item.jyut} /></div>
                <div className="quiz-ans-cn">{item.cn}</div>
                {dictAnswer && <div style={{ marginTop: 8, fontSize: ".72rem", color: "var(--ink2)", padding: "6px 10px", background: "var(--cream)", borderRadius: 8 }}>Your answer: "{dictAnswer}"</div>}
              </div>
              <div style={{ fontSize: ".68rem", color: "var(--ink3)", marginBottom: 8 }}>Were you close?</div>
              <div className="quiz-grade">
                <button className="quiz-g-btn quiz-g-yes" onClick={() => grade("right")}>✓ Got it</button>
                <button className="quiz-g-btn quiz-g-almost" onClick={() => grade("almost")}>~ Almost</button>
                <button className="quiz-g-btn quiz-g-no" onClick={() => grade("wrong")}>✗ Nope</button>
              </div>
            </>
          )}
          <div className="quiz-score">{score.right} correct · {score.wrong} sent back for review</div>
        </div>
      </div>
    );
  }

  return null;
}

function App() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [tab, setTab] = useState("home");
  const [selUnit, setSelUnit] = useState(1);
  const [progress, setProgress] = useState({ phrases:{}, vocab:{}, unit10:[], phraseTs:{}, lastReview:{}, lessonLog:[], quizCount:0 });
  const [settings, setSettings] = useState({});
  const [popup, setPopup] = useState(null);
  const [playlist, setPlaylist] = useState(null);
  const [profileMenu, setProfileMenu] = useState(false);
  const saveTimer = useRef(null);

  // Inject CSS
  useEffect(() => {
    const s = document.createElement("style"); s.textContent = CSS + QUIZ_CSS; document.head.appendChild(s);
    localStorage.setItem('shadowspeak-last-lang', 'canto.html');
    return () => document.head.removeChild(s);
  }, []);

  // Firebase auth listener
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(u => {
      setUser(u);
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  // Load progress from Firestore when user signs in
  useEffect(() => {
    if (!user) return;
    (async () => {
      // Try Firestore first, fall back to localStorage
      const cloud = await loadFromFirestore(user.uid);
      if (cloud) {
        setProgress({ phrases:cloud.phrases||{}, vocab:cloud.vocab||{}, unit10:cloud.unit10||[], phraseTs:cloud.phraseTs||{}, lastReview:cloud.lastReview||{}, lessonLog:cloud.lessonLog||[], quizCount:cloud.quizCount||0 });
      } else {
        // Migrate from old localStorage if exists
        const oldProfile = localStorage.getItem("canto-profile");
        if (oldProfile) {
          const d = JSON.parse(localStorage.getItem(`cp-${oldProfile}`)||"{}");
          const migrated = { phrases:d.phrases||{}, vocab:d.vocab||{}, unit10:d.unit10||[], phraseTs:d.phraseTs||{}, lastReview:d.lastReview||{}, lessonLog:d.lessonLog||[], quizCount:d.quizCount||0 };
          setProgress(migrated);
          saveToFirestore(user.uid, migrated); // migrate up to cloud
        }
      }
      const cloudSettings = await loadSettingsFromFirestore(user.uid);
      if (cloudSettings) {
        setSettings(cloudSettings);
        _activeEnVoiceId = cloudSettings.enVoice || DEFAULT_EN_VOICE;
        _activeCantoVoiceId = cloudSettings.cantoVoice || DEFAULT_CANTO_VOICE;
      } else {
        const ls = JSON.parse(localStorage.getItem("canto-settings")||"{}");
        const defaults = { learnMode: ls.learnMode||"speaking", enVoice: DEFAULT_EN_VOICE, cantoVoice: DEFAULT_CANTO_VOICE, defaultSpeed: "normal", onboardingDone: false };
        setSettings(defaults);
        _activeEnVoiceId = DEFAULT_EN_VOICE;
        _activeCantoVoiceId = DEFAULT_CANTO_VOICE;
      }
    })();
  }, [user]);

  // Debounced save: localStorage immediately, Firestore after 2s idle
  const save = useCallback((updated) => {
    if (!user) return;
    localStorage.setItem(`cp-${user.uid}`, JSON.stringify(updated));
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveToFirestore(user.uid, updated), 2000);
  }, [user]);

  const upd = useCallback((path, value) => {
    setProgress(prev => {
      const u = { ...prev };
      const p = path.split(".");
      if (p.length === 1) u[p[0]] = value;
      else u[p[0]] = { ...u[p[0]], [p[1]]: value };
      if (p[0] === "phrases" && value === true) {
        u.phraseTs = { ...u.phraseTs, [p[1]]: Date.now() };
      }
      save(u);
      const vk = Object.keys(u.vocab||{}).filter(k=>u.vocab[k]).length;
      const tw = ALL_WORDS.length;
      if(vk===Math.min(200,tw)&&!localStorage.getItem("ms1")){localStorage.setItem("ms1","1");setTimeout(()=>setPopup({e:"🎊",t:"Tier 1 Complete!",s:"You can survive HK!"}),300);}
      return u;
    });
  }, [save]);

  const markReviewed = useCallback((key) => {
    setProgress(prev => {
      const u = { ...prev, lastReview: { ...prev.lastReview, [key]: Date.now() } };
      save(u); return u;
    });
  }, [save]);

  const updSettings = useCallback((path, val) => {
    setSettings(prev => {
      const u = { ...prev }; const p = path.split(".");
      if (p.length === 1) u[p[0]] = val; else u[p[0]] = { ...u[p[0]], [p[1]]: val };
      if (path === "enVoice") _activeEnVoiceId = val;
      if (path === "cantoVoice") _activeCantoVoiceId = val;
      localStorage.setItem("canto-settings", JSON.stringify(u));
      if (user) saveSettingsToFirestore(user.uid, u);
      return u;
    });
  }, [user]);

  // Audio playlist
  const [showPlBuilder, setShowPlBuilder] = useState(false);
  const plActive = useRef(false);
  useEffect(() => {
    if (!playlist || !playlist.playing) { plActive.current = false; return; }
    plActive.current = true;
    const item = playlist.items[playlist.idx];
    if (!item) { setPlaylist(null); setPopup({ e:"🎵", t:"Playlist complete!", s:`Reviewed ${playlist.items.length} items` }); return; }
    const gapMs = { slow: 2500, normal: 1500, fast: 700 }[playlist.speed || "normal"];
    let cancelled = false;
    (async () => {
      await speakPhrase(item);
      await new Promise(r => setTimeout(r, gapMs));
      if (!cancelled && plActive.current) setPlaylist(prev => prev ? { ...prev, idx: prev.idx + 1 } : null);
    })();
    return () => { cancelled = true; if("speechSynthesis"in window) speechSynthesis.cancel(); };
  }, [playlist?.idx, playlist?.playing, playlist?.speed]);

  const startPlaylist = useCallback((items, title) => {
    setPlaylist({ items, title, idx: 0, playing: true, speed: "normal" });
  }, []);

  // Loading state
  if (authLoading) return <div className="ca"><div className="pkr"><div style={{color:"var(--lime)",fontSize:"1rem",fontWeight:900}}>Loading...</div></div></div>;

  // Not signed in: redirect to landing page
  if (!user) { window.location.href = "index.html"; return null; }

  const profile = user.uid;
  const displayName = user.displayName || "Learner";
  const photoURL = user.photoURL;
  const vk = Object.keys(progress.vocab||{}).filter(k=>progress.vocab[k]).length;

  // Voice onboarding — show once on first visit
  if (settings.onboardingDone === false) {
    return <VoiceOnboarding onComplete={(enVoice, cantoVoice) => {
      updSettings("enVoice", enVoice);
      updSettings("cantoVoice", cantoVoice);
      updSettings("onboardingDone", true);
    }} />;
  }

  return (
    <div className={`ca ${settings.learnMode === "reading" ? "reading-mode" : ""}`}>
      <div className="hdr">
        <div className="hdr-l">
          <div className="hm"><HKFlag /></div>
          <div><div className="ht">Canto is Easy</div></div>
          <div className="tn">
            {[{id:"home",icon:"🏠",l:"Today"},{id:"phrases",icon:"🗣",l:"Phrases"},{id:"vocab",icon:"📖",l:"Vocab"},{id:"quiz",icon:"📝",l:"Quiz"},{id:"unit10",icon:"📖",l:"Mine"},{id:"settings",icon:"⚙️",l:"Settings"}].map(t=>
              <button key={t.id} className={`tn-btn ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}><span className="tn-icon">{t.icon}</span>{t.l}</button>
            )}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>window.location.href="mandarin.html"} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,padding:"4px 8px",fontSize:".85rem",cursor:"pointer",lineHeight:1}} title="Switch to Mandarin">🇨🇳</button>
          <div style={{position:"relative"}}>
            {photoURL ? (
              <img src={photoURL} referrerPolicy="no-referrer" style={{width:30,height:30,borderRadius:"50%",border:"2px solid var(--lime)",cursor:"pointer"}} onClick={()=>setProfileMenu(v=>!v)} title={displayName} />
            ) : (
              <div className="ha" style={{background:"var(--lime)",color:"var(--for)",cursor:"pointer"}} onClick={()=>setProfileMenu(v=>!v)}>{displayName[0]}</div>
            )}
            {profileMenu && <>
              <div style={{position:"fixed",inset:0,zIndex:998}} onClick={()=>setProfileMenu(false)} />
              <div style={{position:"absolute",right:0,top:"calc(100% + 8px)",background:"var(--wh)",border:"1.5px solid var(--st)",borderRadius:14,padding:"10px 0",minWidth:220,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,.15)"}}>
                <div style={{padding:"8px 16px",borderBottom:"1px solid var(--st)"}}>
                  <div style={{fontSize:".78rem",fontWeight:800,color:"var(--ink)"}}>{displayName}</div>
                  <div style={{fontSize:".62rem",color:"var(--ink2)"}}>{user.email}</div>
                </div>
                <button onClick={()=>{setProfileMenu(false);window.location.href="mandarin.html";}} style={{width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",fontSize:".75rem",fontWeight:700,color:"var(--ink)",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>🇨🇳 Switch to Mandarin</button>
                <button onClick={()=>{setProfileMenu(false);window.location.href="index.html";}} style={{width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",fontSize:".75rem",fontWeight:700,color:"var(--ink)",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>🏠 Back to home</button>
                <div style={{borderTop:"1px solid var(--st)",margin:"2px 0"}} />
                <button onClick={()=>{fbAuth.signOut();window.location.href="index.html";}} style={{width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",fontSize:".75rem",fontWeight:700,color:"#e74c3c",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>🚪 Sign out</button>
              </div>
            </>}
          </div>
        </div>
      </div>

      {tab==="home"&&<TodayTab profile={displayName} progress={progress} upd={upd} markReviewed={markReviewed} setTab={setTab} setSelUnit={setSelUnit} startPlaylist={startPlaylist} openPlBuilder={()=>setShowPlBuilder(true)} />}
      {tab==="phrases"&&<PhrasesTab progress={progress} upd={upd} selUnit={selUnit} setSelUnit={setSelUnit} />}
      {tab==="vocab"&&<VocabTab progress={progress} upd={upd} startPlaylist={startPlaylist} />}
      {tab==="unit10"&&<Unit10Tab progress={progress} upd={upd} />}
      {tab==="settings"&&<SettingsTab settings={settings} updSettings={updSettings} />}
      {tab==="quiz"&&<QuizTab progress={progress} upd={upd} />}

      {/* Playlist builder overlay */}
      {showPlBuilder && <PlaylistBuilder onClose={()=>setShowPlBuilder(false)} onPlay={(items,title)=>{setShowPlBuilder(false);startPlaylist(items,title);}} progress={progress} />}

      {/* Playlist bar — redesigned (#20) */}
      {playlist && <div style={{position:"fixed",bottom:54,left:0,right:0,zIndex:110,padding:"0 10px"}}><div className="pl-bar-v2">
        <button className="pl-v2-close" onClick={()=>{setPlaylist(null);if("speechSynthesis"in window)speechSynthesis.cancel();}}>✕</button>
        <button className="pl-v2-play" onClick={()=>setPlaylist(p=>p?{...p,playing:!p.playing}:null)}>{playlist.playing?"⏸":"▶"}</button>

function getStats(progress) {
  const known = Object.keys(progress.phrases||{}).filter(k=>(progress.phrases||{})[k]).length;
  const lessonLog = progress.lessonLog || [];
  const streak = calcStreak(lessonLog);
  const totalMins = lessonLog.reduce((s,l) => s + (l.mins||30), 0);
  const unitsDone = UNITS.filter(u => u.phrases.every((_,i) => (progress.phrases||{})[`${u.id}-${i}`])).length;
  const quizzes = progress.quizCount || 0;
  return { known, streak, totalMins, unitsDone, quizzes, lessonLog };
}

function calcStreak(log) {
  if (!log.length) return 0;
  const today = new Date();
  const todayStr = today.toDateString();
  const dates = [...new Set(log.map(l => new Date(l.date).toDateString()))].sort((a,b) => new Date(b)-new Date(a));

  // Must have done a lesson today or on the last weekday
  const lastLesson = new Date(dates[0]);
  const daysSinceLast = Math.round((today - lastLesson) / 86400000);
  // Allow gap: if today is Monday, last lesson on Friday = okay (3 days gap)
  // If today is a weekday and last lesson was yesterday = okay
  // Skip weekends in the gap check
  function weekdaysBetween(d1, d2) {
    let count = 0;
    const start = new Date(Math.min(d1, d2));
    const end = new Date(Math.max(d1, d2));
    const cur = new Date(start);
    cur.setDate(cur.getDate() + 1);
    while (cur < end) {
      const day = cur.getDay();
      if (day !== 0 && day !== 6) count++;
      cur.setDate(cur.getDate() + 1);
    }
    return count;
  }

  if (dates[0] !== todayStr) {
    const gap = weekdaysBetween(lastLesson, today);
    if (gap > 1) return 0; // missed a weekday
  }

  let streak = 1;
  for (let i = 1; i < dates.length; i++) {
    const gap = weekdaysBetween(new Date(dates[i]), new Date(dates[i-1]));
    if (gap <= 1) streak++;
    else break;
  }
  return streak;
}

function didLessonToday(progress) {
  const log = progress.lessonLog || [];
  const today = new Date().toDateString();
  return log.some(l => new Date(l.date).toDateString() === today);
}

// ---- SHARED AUTO-GLOSS HELPER ----
function getAutoGloss(ph) {
  if (!ph || !ph.cn) return [];
  if (GLOSS_DATA[ph.cn]) return GLOSS_DATA[ph.cn];
  const cn = (ph.cn||"").replace(/[，。！？、「」]/g, "").trim();
  const jy = (ph.jyut||"").replace(/[，,]/g, " ").replace(/\s+/g," ").trim();
  const jyParts = jy.split(" ").filter(Boolean);
  const chars = [...cn].filter(c => c.trim());
  const result = [];
  let ci = 0, ji = 0;
  while (ci < chars.length) {
    if (ci + 1 < chars.length && ji + 1 < jyParts.length) {
      result.push({ cn: chars[ci] + chars[ci+1], jy: jyParts[ji] + " " + jyParts[ji+1], en: "" });
      ci += 2; ji += 2;
    } else {
      result.push({ cn: chars[ci] || "", jy: jyParts[ji] || "", en: "" });
      ci++; ji++;
    }
  }
  return result;
}

function LessonMode({ progress, upd, profile, settings, onComplete, onQuit }) {
  // Restore lesson state from sessionStorage if available
  const saved = useMemo(() => {
    try { const s = sessionStorage.getItem("canto-lesson"); return s ? JSON.parse(s) : null; } catch(e) { return null; }
  }, []);
  const [showIntro, setShowIntro] = useState(!saved);
  const [phase, setPhase] = useState(saved?.phase || 0);
  const [timeLeft, setTimeLeft] = useState(saved?.timeLeft ?? 30*60);
  const [phaseTimeLeft, setPhaseTimeLeft] = useState(saved?.phaseTimeLeft ?? 3*60);
  const [paused, setPaused] = useState(false);
  const [phaseData, setPhaseData] = useState(null);
  const [innerIdx, setInnerIdx] = useState(saved?.innerIdx || 0);
  const [shadowPhase, setShadowPhase] = useState("play");

  const [revealed, setRevealed] = useState(false);
  const [quizScore, setQuizScore] = useState(saved?.quizScore || {right:0,wrong:0});
  const [lessonDone, setLessonDone] = useState(false);
  const [speed, setSpeed] = useState(settings?.defaultSpeed || "normal");
  const [showJyut, setShowJyut] = useState(true);
  const [showTransition, setShowTransition] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreResult, setScoreResult] = useState(null);
  const timerRef = useRef(null);
  const shadowTimer = useRef(null);

  // Save lesson state to sessionStorage on every change
  useEffect(() => {
    if (!lessonDone && !showIntro) {
      sessionStorage.setItem("canto-lesson", JSON.stringify({ phase, timeLeft, phaseTimeLeft, innerIdx, quizScore }));
    }
  }, [phase, timeLeft, phaseTimeLeft, innerIdx, quizScore, lessonDone, showIntro]);

  const phaseDurations = [3*60, 7*60, 8*60, 5*60, 5*60, 2*60];
  const phaseInfo = [
    { name: "Warm-up", short: "Warm-up", icon: "🔥", desc: "Shadow recent phrases", coach: "Listen and say them out loud. No pressure.", transDesc: "Let's ease in. These are phrases you've seen before. Listen and say them out loud. No pressure." },
    { name: "New Phrases", short: "Learn", icon: "🆕", desc: "Hear English, try Cantonese, hear answer", coach: "You'll hear the English first, then the Cantonese. Say each one out loud.", transDesc: "Time for something new. You'll hear the English, then try to say it in Cantonese. Each new phrase expands what you can say in the real world." },
    { name: "Repeat Drill", short: "Drill", icon: "🗣", desc: "Repeat after me", coach: "Listen to the whole phrase, then say it out loud.", transDesc: "Repeat each phrase out loud three times. First the whole thing, then broken into words, then back together again." },
    { name: "Mix & Review", short: "Review", icon: "🔁", desc: "Old + new shuffled", coach: "Old and new mixed together. Say each one out loud.", transDesc: "Old and new phrases mixed together. Say each one out loud. This is where your brain starts connecting everything." },
    { name: "Quiz", short: "Quiz", icon: "📝", desc: "Prove you know it", coach: "See the English and try to say it in Cantonese out loud.", transDesc: "See the English and try to say it out loud in Cantonese. Testing yourself makes the memory stronger." },
    { name: "Cool-down", short: "Wind down", icon: "🎧", desc: "One last listen", coach: "One last gentle listen. Let the sounds settle.", transDesc: "One last gentle listen. Let the sounds settle into your memory while you relax." },
  ];

  // Coaching cues per drill pass
  const drillCoach = [
    {emoji:"🎯", text:"Listen to the whole phrase, then say it out loud"},
    {emoji:"🔍", text:"Say it out loud. See how the words fit together and what each one means."},
    {emoji:"🧩", text:"Put it all together. Say the whole phrase out loud."},
  ];

  const speedGaps = { slow:[4000,4500], normal:[2800,3200], fast:[1500,1800] };

  useEffect(() => {
    const due = getDueItems(progress).slice(0, 10);
    const newP = getNewItems(progress).slice(0, 5);
    const lifePriority = (progress.unit10||[]).filter(s=>s.cn&&s.cn!=="(add characters)"&&!s.known).slice(0,5).map(s=>({en:s.en,jyut:s.jyut,cn:s.cn,tag:s.tag,unitId:11,key:"life"}));
    const lifeOther = (progress.unit10||[]).filter(s=>s.cn&&s.cn!=="(add characters)"&&s.known).slice(0,2).map(s=>({en:s.en,jyut:s.jyut,cn:s.cn,tag:s.tag,unitId:11,key:"life"}));
    const newWithLife = [...lifePriority, ...newP, ...lifeOther].slice(0,7);
    const mixItems = [...newWithLife, ...due.slice(0,5)].sort(()=>Math.random()-0.5);
    const quizItems = Object.keys(progress.phrases||{}).filter(k=>(progress.phrases||{})[k]).map(k=>{
      const [uid,pi] = k.split("-").map(Number);
      const u = UNITS.find(x=>x.id===uid);
      return u?.phrases[pi] ? {...u.phrases[pi],key:k,unitId:uid,phraseIdx:pi} : null;
    }).filter(Boolean).sort(()=>Math.random()-0.5).slice(0,10);
    setPhaseData({ warmup: due.length?due:newWithLife, newPhrases: newWithLife, drill: newWithLife, mix: mixItems, quiz: quizItems, cooldown: newWithLife });
  }, []);

  // Countdown timers
  useEffect(() => {
    if (paused || lessonDone || showIntro || showTransition) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if(t<=1){setLessonDone(true);sessionStorage.removeItem("canto-lesson");return 0;} return t-1; });
      setPhaseTimeLeft(t => { if(t<=1){advancePhase();return 0;} return t-1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [paused, lessonDone, phase, showIntro, showTransition]);

  // Shadow/drill auto-advance (phases 0,1,2,3,5 — not 4 which is quiz)
  useEffect(() => {
    if (paused || lessonDone || phase === 4 || showIntro || showTransition) return;
    if (!phaseData) return;
    clearTimeout(shadowTimer.current);
    const items = getPhaseItems();
    if (!items || items.length===0) return;
    const safeIdx = innerIdx % items.length;
    const [playGap, shadowGap] = speedGaps[speed];

    if (phase === 1) {
      if (shadowPhase === "play") {
        shadowTimer.current = setTimeout(() => setShadowPhase("answer"), playGap + 1000);
      } else if (shadowPhase === "answer") {
        speak(items[safeIdx].cn);
        shadowTimer.current = setTimeout(() => setShadowPhase("shadow"), playGap);
      } else {
        shadowTimer.current = setTimeout(() => {
          setInnerIdx(i => i + 1);
          setShadowPhase("play");
        }, shadowGap);
      }
    } else if (phase === 2) {
      if (shadowPhase === "play") {
        speak(items[safeIdx].cn);
        shadowTimer.current = setTimeout(() => setShadowPhase("shadow"), playGap);
      } else {
        shadowTimer.current = setTimeout(() => {
          setInnerIdx(i => i + 1);
          setShadowPhase("play");
        }, shadowGap);
      }
    } else {
      if (shadowPhase === "play") {
        speak(items[safeIdx].cn);
        shadowTimer.current = setTimeout(() => setShadowPhase("shadow"), playGap);
      } else {
        shadowTimer.current = setTimeout(() => {
          setInnerIdx(i => i + 1);
          setShadowPhase("play");
        }, shadowGap);
      }
    }
    return () => clearTimeout(shadowTimer.current);
  }, [phase, innerIdx, shadowPhase, paused, lessonDone, phaseData, speed, showIntro, showTransition]);

  function getPhaseItems() {
    if (!phaseData) return [];
    switch(phase) {
      case 0: return phaseData.warmup;
      case 1: return phaseData.newPhrases;
      case 2: return phaseData.drill;
      case 3: return phaseData.mix;
      case 4: return phaseData.quiz;
      case 5: return phaseData.cooldown;
      default: return [];
    }
  }

  const advancePhase = useCallback(() => {
    if (phase >= 5) { setLessonDone(true); sessionStorage.removeItem("canto-lesson"); return; }
    const next = phase + 1;
    // Show phase transition card
    setShowTransition(true);
    const cp = phaseInfo[next];
    // Voice coaching via TTS
    speakEnglish(cp.transDesc + " Remember, say it out loud!");
    setTimeout(() => {
      setShowTransition(false);
      setPhase(next);
      setPhaseTimeLeft(phaseDurations[next] || 120);
      setInnerIdx(0); setShadowPhase("play"); setRevealed(false); setDrillPass(0);
    }, 3000);
  }, [phase]);

  const skipTransition = () => {
    stopAudio();
    setShowTransition(false);
    const next = phase + 1;
    setPhase(next);
    setPhaseTimeLeft(phaseDurations[next] || 120);
    setInnerIdx(0); setShadowPhase("play"); setRevealed(false); setDrillPass(0);
  };

  const handleQuizGrade = (result) => {
    const items = phaseData.quiz;
    if (!items.length) return;
    const item = items[innerIdx % items.length];
    if (result==="wrong" && item?.key && item.key!=="life") upd(`phrases.${item.key}`, false);
    setQuizScore(prev=>({...prev,[result]:(prev[result]||0)+1}));
    setRevealed(false);
    if (innerIdx+1 < items.length) setInnerIdx(i=>i+1);
  };

  // Pronunciation scoring in quiz phase
  const quizStartTest = async () => {
    setPaused(true);
    stopAudio();
    try { const ok = await startRecording(); if (ok) setIsRecording(true); } catch(e) { console.warn("Mic error:", e); }
  };
  const quizStopTest = async () => {
    setIsRecording(false);
    setScoring(true);
    const blob = await stopRecording();
    const items = getPhaseItems();
    const safeIdx = innerIdx % (items?.length || 1);
    const ph = items?.[safeIdx];
    if (blob && ph) {
      try {
        const result = await scorePronunciation(blob, ph.cn, "cantonese");
        let chars = [];
        if (result.expectedJyutping && result.transcribedJyutping) {
          const expSyls = result.expectedJyutping.trim().split(/\s+/);
          const yourSyls = result.transcribedJyutping.trim().split(/\s+/);
          const cnChars = ph.cn.replace(/[，,。！？!?\s]/g, "").split("");
          for (let i = 0; i < Math.max(expSyls.length, cnChars.length); i++) {
            chars.push({ cn: cnChars[i] || "", e: expSyls[i] || "", y: yourSyls[i] || "", m: expSyls[i] === yourSyls[i] ? 1 : 0 });
          }
        }
        setScoreResult({ score: result.score, passed: result.passed, chars, phrase: ph });
      } catch(e) {
        console.error("Quiz scoring error:", e);
        setScoreResult(null);
      }
    }
    setScoring(false);
  };

  // Mark known in Review/Quiz only (#17)
  const markKnownInLesson = () => {
    const items = getPhaseItems();
    if (!items?.length) return;
    const safeIdx = innerIdx % items.length;
    const item = items[safeIdx];
    if (item?.key) upd(`phrases.${item.key}`, true);
  };

  if (!phaseData) return <div className="sho navy" style={{alignItems:"center",justifyContent:"center"}}><div style={{color:"var(--lime)",fontSize:"1rem",fontWeight:900}}>Preparing lesson...</div></div>;

  // ===== INTRO SCREEN (#13) =====
  if (showIntro) {
    return (
      <div className="sho navy" style={{overflow:"auto"}}>
        <div className="lesson-intro">
          <div className="li-emoji">🎯</div>
          <div className="li-title">30 minutes of<br/>speaking practice.</div>
          <div className="li-sub">You'll listen to real Cantonese phrases, then say them <strong>out loud</strong>. This is called <strong>shadowing</strong>. It trains your ear to hear the sounds and your mouth to make them. Each lesson has 6 short sections:</div>

          <div className="li-roadmap">
            {phaseInfo.map((p,i) => (
              <div key={i} className="rm-item">
                <div className={`rm-icon ${["warmup","learn","drill","review","quiz","wind"][i]}`}>{p.icon}</div>
                <div className="rm-text">
                  <div className="rm-name">{p.short}</div>
                  <div className="rm-desc">{p.transDesc}</div>
                </div>
                <div className="rm-dur">{Math.floor(phaseDurations[i]/60)} min</div>
              </div>
            ))}
          </div>

          <button className="li-go" onClick={()=>{setShowIntro(false);setShowTransition(true);speakEnglish(phaseInfo[0].transDesc+" Remember, say it out loud!");setTimeout(()=>{setShowTransition(false);},3000);}}>Let's go 💪</button>

          <div className="li-tip">
            <span className="li-tip-emoji">💡</span>
            <div className="li-tip-text"><strong>Say it out loud.</strong> Even whispering is 3× more effective than just listening. Your mouth needs to learn the shapes.</div>
          </div>
        </div>
      </div>
    );
  }

  // ===== PHASE TRANSITION CARD (#14) =====
  if (showTransition) {
    const nextPhase = Math.min(phase + 1, 5);
    const tp = phase === 0 && !saved ? phaseInfo[0] : phaseInfo[nextPhase];
    return (
      <div className="phase-trans navy">
        <div className="pt-icon">{tp.icon}</div>
        <div className="pt-name">{tp.short}</div>
        <div className="pt-desc">{tp.transDesc}</div>
        <div className="voice-coach">
