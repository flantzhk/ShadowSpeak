<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShadowSpeak — Learn Cantonese & Mandarin by Shadowing</title>
  <meta name="description" content="ShadowSpeak uses the proven shadowing method to help you speak Cantonese and Mandarin. AI-powered pronunciation, spaced repetition, and offline support. Built in Hong Kong." />
  <meta name="keywords" content="learn Cantonese, learn Mandarin, Cantonese app, Mandarin app, shadowing method, language learning, speak Chinese, Hong Kong, pronunciation practice, spaced repetition" />
  <meta property="og:title" content="ShadowSpeak — Learn Cantonese & Mandarin by Shadowing" />
  <meta property="og:description" content="Master Cantonese and Mandarin with the shadowing method. AI voices, pronunciation scoring, and offline mode. Free to use." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://flantzhk.github.io/ShadowSpeak/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ShadowSpeak — Learn Cantonese & Mandarin" />
  <meta name="twitter:description" content="Master Cantonese and Mandarin with the shadowing method. AI voices, pronunciation scoring, and offline mode." />
  <link rel="canonical" href="https://flantzhk.github.io/ShadowSpeak/" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1F3329" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+HK:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root { --cream:#F5F2EE; --lime:#C4F000; --for:#1F3329; --ink:#2C2C2C; --ink2:#5A554F; --ink3:#7A756E; --st:#EDE8E0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; width:100%; }
    body { font-family:'DM Sans',-apple-system,sans-serif; background:var(--for); color:var(--ink); -webkit-font-smoothing:antialiased; }

    .page-wrap { max-width:720px; margin:0 auto; }

    /* Nav */
    .nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; max-width:720px; margin:0 auto; }
    .nav-logo { display:flex; align-items:center; gap:8px; }
    .nav-logo-icon { font-size:20px; }
    .nav-logo-text { font-size:16px; font-weight:900; color:#fff; }
    .nav-logo-text span { color:var(--lime); }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .nav-login { font-size:14px; color:var(--lime); font-weight:700; cursor:pointer; text-decoration:underline; text-underline-offset:3px; background:none; border:none; font-family:inherit; padding:8px 4px; }
    .nav-signup { display:inline-flex; align-items:center; gap:8px; background:var(--lime); border-radius:10px; padding:10px 20px; cursor:pointer; border:none; font-family:inherit; }
    .nav-signup span { font-size:14px; font-weight:700; color:var(--for); }

    /* Hero */
    .hero { padding:40px 32px 48px; text-align:center; max-width:720px; margin:0 auto; }
    .hero-pill { display:inline-block; background:rgba(196,240,0,.15); border:1px solid rgba(196,240,0,.25); border-radius:999px; padding:6px 18px; margin-bottom:20px; }
    .hero-pill span { font-size:13px; font-weight:700; color:var(--lime); letter-spacing:1.5px; text-transform:uppercase; }
    .hero-title { font-size:clamp(32px, 5vw, 48px); font-weight:900; color:#fff; line-height:1.1; margin-bottom:12px; letter-spacing:-1px; }
    .hero-title span { color:var(--lime); }
    .hero-sub { font-size:clamp(16px, 2.5vw, 20px); color:rgba(255,255,255,.7); line-height:1.5; max-width:460px; margin:0 auto 28px; }
    .hero-sub strong { color:var(--lime); font-weight:700; }
    .hero-sync { font-size:13px; color:rgba(255,255,255,.4); margin-top:12px; }

    /* CTA buttons */
    .cta-btn { display:inline-flex; align-items:center; gap:10px; background:var(--lime); border-radius:14px; padding:16px 32px; cursor:pointer; border:none; font-family:inherit; transition:transform .1s; }
    .cta-btn:hover { transform:translateY(-1px); }
    .cta-btn:active { transform:scale(.97); }
    .cta-btn span { font-size:16px; font-weight:700; color:var(--for); }
    .cta-btn.small { padding:14px 28px; border-radius:12px; }
    .cta-btn.small span { font-size:15px; }

    /* User bar */
    .user-bar { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:12px; }
    .user-avatar { width:40px; height:40px; border-radius:50%; border:2.5px solid var(--lime); }
    .user-name { font-size:16px; font-weight:700; color:#fff; }

    /* Cream section */
    .cream { background:var(--cream); padding:48px 32px; }
    .cream-inner { max-width:720px; margin:0 auto; }

    /* Method */
    .method-header { text-align:center; margin-bottom:32px; }
    .section-label { font-size:13px; font-weight:800; color:var(--ink2); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .method-title { font-size:clamp(22px, 3.5vw, 30px); font-weight:900; color:var(--for); line-height:1.3; }
    .method-desc { font-size:15px; color:var(--ink2); margin-top:12px; line-height:1.7; max-width:500px; margin-left:auto; margin-right:auto; }

    /* Steps */
    .steps { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:40px; }
    .step { display:flex; gap:14px; align-items:flex-start; background:#fff; border-radius:14px; padding:20px; border:1px solid var(--st); }
    .step-icon { width:40px; height:40px; border-radius:12px; background:rgba(196,240,0,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:18px; }
    .step-name { font-size:15px; font-weight:800; color:var(--for); margin-bottom:4px; }
    .step-desc { font-size:13px; color:var(--ink2); line-height:1.6; }

    /* Language cards */
    .lang-header { text-align:center; margin-bottom:20px; }
    .lang-cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:32px; }
    .lang-card { background:#fff; border:2px solid var(--st); border-radius:18px; padding:28px 20px; text-align:center; cursor:pointer; transition:all .2s; position:relative; }
    .lang-card:hover { border-color:var(--lime); transform:translateY(-3px); box-shadow:0 12px 32px rgba(0,0,0,.08); }
    .lang-card:active { transform:scale(.98); }
    .lang-flag { font-size:2.5rem; margin-bottom:10px; }
    .lang-name { font-size:16px; font-weight:800; color:var(--for); }
    .lang-native { font-size:22px; font-weight:800; color:var(--ink); margin:6px 0 8px; }
    .lang-stats { font-size:13px; color:var(--ink2); line-height:1.5; }
    .lang-badge { display:inline-block; background:var(--lime); color:var(--for); font-size:12px; font-weight:800; padding:6px 14px; border-radius:999px; margin-top:12px; }
    .lang-card .signin-badge { display:inline-block; background:var(--for); color:#fff; font-size:12px; font-weight:800; padding:6px 14px; border-radius:999px; margin-top:12px; }

    /* Bottom CTA */
    .bottom-cta { background:var(--for); border-radius:18px; padding:28px 24px; text-align:center; margin-bottom:24px; }
    .bottom-cta-title { font-size:18px; font-weight:800; color:var(--lime); margin-bottom:6px; }
    .bottom-cta-desc { font-size:14px; color:rgba(255,255,255,.55); line-height:1.6; margin-bottom:20px; max-width:400px; margin-left:auto; margin-right:auto; }
    .bottom-login { margin-top:12px; }
    .bottom-login span { font-size:13px; color:rgba(255,255,255,.45); }
    .bottom-login a { font-size:13px; color:var(--lime); font-weight:700; cursor:pointer; text-decoration:underline; text-underline-offset:3px; }

    .footer { text-align:center; font-size:13px; color:var(--ink3); padding-bottom:8px; }

    /* Loading */
    .loading { min-height:100vh; display:flex; align-items:center; justify-content:center; gap:8px; }
    .loading-dot { width:10px; height:10px; border-radius:50%; background:var(--lime); animation:bounce .6s infinite alternate; }
    .loading-dot:nth-child(2) { animation-delay:.15s; }
    .loading-dot:nth-child(3) { animation-delay:.3s; }
    @keyframes bounce { to { transform:translateY(-10px); opacity:.4; } }

    /* Mobile */
    @media(max-width:600px) {
      .steps { grid-template-columns:1fr; }
      .lang-cards { grid-template-columns:1fr 1fr; }
      .hero { padding:28px 20px 36px; }
      .cream { padding:32px 20px; }
      .nav { padding:12px 16px; }
    }
    @media(max-width:380px) {
      .lang-cards { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
  </div>

  <script>
    // One-time SW cache nuke — remove after v3.9.6 is stable
    (function() {
      var nukeKey = 'ss-cache-nuke-v6';
      if (!localStorage.getItem(nukeKey) && 'serviceWorker' in navigator) {
        localStorage.setItem(nukeKey, '1');
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        }).then(function() {
          setTimeout(function() { location.reload(true); }, 500);
        });
        return;
      }
    })();
  </script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBl8PRFr84XLNZNxfSg7LpVekjh5lvBWRI",
      authDomain: "shadowspeak-22f04.firebaseapp.com",
      projectId: "shadowspeak-22f04",
      storageBucket: "shadowspeak-22f04.firebasestorage.app",
      messagingSenderId: "332784610142",
      appId: "1:332784610142:web:0dfaf945993e735ef03dcf"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    window.shadowspeak = { auth, db };

    // Enable Firestore offline persistence
    db.enablePersistence({ synchronizeTabs: true }).catch(err => {
      if (err.code === 'failed-precondition') console.warn("Firestore persistence: multiple tabs open");
      else if (err.code === 'unimplemented') console.warn("Firestore persistence: not supported");
    });

    // Register Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          console.log("SW registered:", reg.scope);
        }).catch(err => console.warn("SW registration failed:", err));
      });
    }

    const G_ICON = '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
    const G_DARK = G_ICON.replace(/currentColor/g,'#1F3329');

    let currentUser = null;
    let pendingRedirect = null; // stores 'app.html?lang=canto' or 'app.html?lang=mandarin'

    function render() {
      const app = document.getElementById('app');
      const signedIn = !!currentUser;
      const photo = currentUser?.photoURL || '';
      const name = currentUser?.displayName || 'Learner';
      const firstName = name.split(' ')[0];
      const lastLang = localStorage.getItem('shadowspeak-last-lang');
      const lastLangName = lastLang && lastLang.includes('canto') ? 'Cantonese' : lastLang && lastLang.includes('mandarin') ? 'Mandarin' : null;

      app.innerHTML = `
        <div class="nav">
          <div class="nav-logo">
            <span class="nav-logo-icon">🗣</span>
            <span class="nav-logo-text">Shadow<span>Speak</span></span>
          </div>
          <div class="nav-right">
            ${signedIn ? `
              <img class="user-avatar" src="${photo}" alt="" referrerpolicy="no-referrer" style="width:32px;height:32px;" />
              <button class="nav-login" onclick="doSignOut()">Sign out</button>
            ` : `
              <button class="nav-login" onclick="doSignIn()">Log in</button>
              <button class="nav-signup" onclick="doSignIn()">
                <span style="color:var(--for);display:flex">${G_DARK}</span>
                <span>Sign up</span>
              </button>
            `}
          </div>
        </div>

        <div class="hero">
          ${signedIn ? `
            <div class="user-bar">
              <img class="user-avatar" src="${photo}" alt="" referrerpolicy="no-referrer" />
              <span class="user-name">Welcome back, ${firstName}</span>
            </div>
            ${lastLangName ? `
              <div style="margin-bottom:20px;">
                <button class="cta-btn" onclick="goTo('${lastLang}')">
                  <span>Continue ${lastLangName} →</span>
                </button>
              </div>
              <div style="font-size:14px;color:rgba(255,255,255,.45);margin-bottom:8px;">or choose below</div>
            ` : ''}
          ` : `
            <div class="hero-pill"><span>Language through speaking</span></div>
          `}
          <div class="hero-title">Shadow<span>Speak</span></div>
          <div class="hero-sub">You don't learn a language by reading it.<br/>You learn it by <strong>hearing it and saying it back.</strong></div>
          ${signedIn ? '' : `
            <button class="cta-btn" onclick="doSignIn()">
              <span style="color:var(--for);display:flex">${G_DARK}</span>
              <span>Get started free</span>
            </button>
            <div class="hero-sync">Progress syncs across all your devices.</div>
          `}
        </div>

        <div class="cream">
          <div class="cream-inner">
            <div class="method-header">
              <div class="section-label">The method</div>
              <div class="method-title">Shadowing is how polyglots<br/>actually learn languages.</div>
              <div class="method-desc">You hear a phrase in your target language, then immediately repeat it out loud. No grammar tables. No flashcard grinding. Your mouth and your ear learn together, the way children do.</div>
            </div>

            <div class="steps">
              <div class="step">
                <div class="step-icon">👂</div>
                <div>
                  <div class="step-name">Listen</div>
                  <div class="step-desc">You hear a real phrase. Your brain starts mapping the sounds, the rhythm, the tone patterns.</div>
                </div>
              </div>
              <div class="step">
                <div class="step-icon">🗣</div>
                <div>
                  <div class="step-name">Say it out loud</div>
                  <div class="step-desc">You repeat it immediately. Even whispering is 3x more effective than listening alone. Your mouth needs to learn the shapes.</div>
                </div>
              </div>
              <div class="step">
                <div class="step-icon">🔁</div>
                <div>
                  <div class="step-name">Repeat and layer</div>
                  <div class="step-desc">Each 30-minute lesson takes you through 6 phases: warm up, learn, drill, review, quiz, wind down. Phrases build on each other.</div>
                </div>
              </div>
              <div class="step">
                <div class="step-icon">🧠</div>
                <div>
                  <div class="step-name">It sticks</div>
                  <div class="step-desc">Shadowing activates motor memory, not just recall. You don't just recognise the words. You can actually say them when you need to.</div>
                </div>
              </div>
            </div>

            <div class="lang-header">
              <div class="section-label">Choose your language</div>
            </div>

            <div class="lang-cards">
              <div class="lang-card" onclick="pickLang('app.html?lang=canto')">
                <div class="lang-flag">🇭🇰</div>
                <div class="lang-name">Cantonese</div>
                <div class="lang-native" style="font-family:'Noto Sans HK',sans-serif">廣東話</div>
                <div class="lang-stats">85 million speakers.<br/>11 units. 374 phrases.</div>
                ${signedIn ? '<div class="lang-badge">Start speaking</div>' : '<div class="signin-badge">Sign in to start →</div>'}
              </div>
              <div class="lang-card" onclick="pickLang('app.html?lang=mandarin')">
                <div class="lang-flag">🇨🇳</div>
                <div class="lang-name">Mandarin</div>
                <div class="lang-native" style="font-family:'Noto Sans SC',sans-serif">普通话</div>
                <div class="lang-stats">920 million speakers.<br/>11 units. 370 phrases.</div>
                ${signedIn ? '<div class="lang-badge">Start speaking</div>' : '<div class="signin-badge">Sign in to start →</div>'}
              </div>
            </div>

            <div class="bottom-cta">
              <div class="bottom-cta-title">30 minutes a day.</div>
              <div class="bottom-cta-desc">That's all it takes. One lesson a day rewires your brain for a new language. Shadowing does more in 30 minutes than most apps do in an hour.</div>
              ${signedIn ? '' : `
                <button class="cta-btn small" onclick="doSignIn()">
                  <span style="color:var(--for);display:flex">${G_DARK}</span>
                  <span>Start learning now</span>
                </button>
                <div class="bottom-login">
                  <span>Already have an account? </span>
                  <a onclick="doSignIn()">Log in</a>
                </div>
              `}
            </div>

            <div class="footer">Built in Hong Kong.</div>
          </div>
        </div>
      `;
    }

    // Sign in with Google
    function doSignIn() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        console.error('Sign-in error:', err);
      });
    }

    // Sign out and clear last language
    function doSignOut() {
      auth.signOut();
    }

    // Pick a language: if signed in, go directly. If not, sign in first then redirect.
    function pickLang(page) {
      if (currentUser) {
        goTo(page);
      } else {
        pendingRedirect = page;
        doSignIn();
      }
    }

    // Navigate to an app and remember the choice
    function goTo(page) {
      localStorage.setItem('shadowspeak-last-lang', page);
      window.location.href = page;
    }

    // Auth state listener
    auth.onAuthStateChanged(user => {
      const wasSignedOut = !currentUser;
      currentUser = user;

      // If user is logged in, always redirect to app (skip landing page)
      if (user) {
        const lastLang = localStorage.getItem('shadowspeak-last-lang');
        if (lastLang) {
          window.location.href = lastLang;
        } else {
          window.location.href = 'app.html?lang=canto';
        }
        return;
      }

      render();
    });
  </script>
</body>
</html>
