<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowSpeak Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#f5f5f5;color:#2c2c2c}
    .login{min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-box{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:360px;width:90%}
    .login-box h1{font-size:20px;margin-bottom:8px}
    .login-box p{font-size:13px;color:#666;margin-bottom:20px}
    .login-box input{width:100%;padding:12px 16px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px}
    .login-box button{width:100%;padding:12px;border:none;background:#1F3329;color:#C4F000;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .login-box .err{color:#e74c3c;font-size:12px;margin-bottom:8px}
    .dash{max-width:1200px;margin:0 auto;padding:24px}
    .dash-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .dash-hdr h1{font-size:22px;font-weight:900;color:#1F3329}
    .dash-hdr button{background:none;border:1.5px solid #ddd;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
    .stat{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stat-val{font-size:28px;font-weight:900;color:#1F3329}
    .stat-lab{font-size:12px;color:#888;font-weight:600;margin-top:4px}
    .section{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .section h2{font-size:16px;font-weight:800;margin-bottom:16px;color:#1F3329}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;background:#f9f9f9;font-weight:700;color:#666;border-bottom:1px solid #eee;white-space:nowrap}
    td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
    .badge-free{background:#f0f0f0;color:#888}
    .badge-premium{background:rgba(196,240,0,.2);color:#1F3329}
    .toggle{cursor:pointer;padding:4px 12px;border-radius:999px;border:1.5px solid #ddd;font-size:11px;font-weight:700;font-family:inherit;background:#fff}
    .toggle.active{background:rgba(196,240,0,.2);border-color:#C4F000;color:#1F3329}
    .toggle.inactive{background:#f5f5f5;color:#999}
    .add-code{display:flex;gap:8px;margin-top:12px}
    .add-code input{flex:1;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
    .add-code button{padding:8px 16px;border:none;background:#1F3329;color:#C4F000;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .search-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;margin-bottom:12px}
    .loading-msg{text-align:center;padding:40px;color:#888}
    @media(max-width:768px){table{font-size:11px}th,td{padding:8px 6px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyBl8PRFr84XLNZNxfSg7LpVekjh5lvBWRI",authDomain:"shadowspeak-22f04.firebaseapp.com",
      projectId:"shadowspeak-22f04",storageBucket:"shadowspeak-22f04.firebasestorage.app",
      messagingSenderId:"332784610142",appId:"1:332784610142:web:0dfaf945993e735ef03dcf"
    });
    const db=firebase.firestore(), app=document.getElementById("app");
    let authed=sessionStorage.getItem("ss-admin-auth")==="true";

    function showLogin(err){
      app.innerHTML=`<div class="login"><div class="login-box">
        <h1>ShadowSpeak Admin</h1><p>Enter admin password to continue.</p>
        ${err?'<div class="err">'+err+'</div>':''}
        <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()"/>
        <button onclick="checkPw()">Enter</button></div></div>`;
      document.getElementById("pw")?.focus();
    }

    async function checkPw(){
      const pw=document.getElementById("pw").value;
      try{
        const doc=await db.collection("config").doc("admin").get();
        const correct=doc.exists?doc.data().password:null;
        if(!correct){showLogin("Create /config/admin doc with password field in Firestore.");return;}
        if(pw===correct){authed=true;sessionStorage.setItem("ss-admin-auth","true");loadDashboard();}
        else showLogin("Wrong password.");
      }catch(e){showLogin("Error: "+e.message);}
    }

    async function loadDashboard(){
      app.innerHTML='<div class="loading-msg">Loading dashboard...</div>';
      const usersSnap=await db.collection("users").get();
      const users=[];usersSnap.forEach(d=>users.push({id:d.id,...d.data()}));
      const cantoSnap=await db.collection("canto-progress").get();
      const mandSnap=await db.collection("mandarin-progress").get();
      const pm={};
      cantoSnap.forEach(d=>{pm[d.id]={...pm[d.id],canto:d.data()};});
      mandSnap.forEach(d=>{pm[d.id]={...pm[d.id],mandarin:d.data()};});
      const promoDoc=await db.collection("config").doc("promoCodes").get();
      let codes=promoDoc.exists?(promoDoc.data().codes||[]):[];

      const now=Date.now(),d7=now-7*864e5,d30=now-30*864e5;
      const tot=users.length;
      const n7=users.filter(u=>u.createdAt?.toDate?.()?.getTime?.()>d7).length;
      const n30=users.filter(u=>u.createdAt?.toDate?.()?.getTime?.()>d30).length;
      const prem=users.filter(u=>u.isPremium).length;
      const free=tot-prem;
      const canto=users.filter(u=>u.selectedLanguage==="canto").length;
      const mand=users.filter(u=>u.selectedLanguage==="mandarin").length;
      let lessons=0;Object.values(pm).forEach(p=>{lessons+=(p.canto?.lessonLog?.length||0)+(p.mandarin?.lessonLog?.length||0);});

      const refMap={};
      users.forEach(u=>{if(u.referredBy){if(!refMap[u.referredBy])refMap[u.referredBy]={total:0,free:0,premium:0};refMap[u.referredBy].total++;if(u.isPremium)refMap[u.referredBy].premium++;else refMap[u.referredBy].free++;}});
      const refs=Object.entries(refMap).sort((a,b)=>b[1].total-a[1].total);

      function render(){
        const q=(document.getElementById("user-search")?.value||"").toLowerCase();
        const f=q?users.filter(u=>(u.displayName||"").toLowerCase().includes(q)||(u.email||"").toLowerCase().includes(q)||(u.referredBy||"").toLowerCase().includes(q)):users;
        app.innerHTML=`<div class="dash">
          <div class="dash-hdr"><h1>ShadowSpeak Admin</h1><button onclick="sessionStorage.removeItem('ss-admin-auth');location.reload()">Logout</button></div>
          <div class="stats">
            <div class="stat"><div class="stat-val">${tot}</div><div class="stat-lab">Total Users</div></div>
            <div class="stat"><div class="stat-val">${n7}</div><div class="stat-lab">New (7 days)</div></div>
            <div class="stat"><div class="stat-val">${n30}</div><div class="stat-lab">New (30 days)</div></div>
            <div class="stat"><div class="stat-val">${prem}</div><div class="stat-lab">Premium (${tot?Math.round(prem/tot*100):0}%)</div></div>
            <div class="stat"><div class="stat-val">${free}</div><div class="stat-lab">Free (${tot?Math.round(free/tot*100):0}%)</div></div>
            <div class="stat"><div class="stat-val">${canto} / ${mand}</div><div class="stat-lab">Cantonese / Mandarin</div></div>
            <div class="stat"><div class="stat-val">${lessons}</div><div class="stat-lab">Total Lessons</div></div>
          </div>
          ${refs.length?`<div class="section"><h2>Referral Leaderboard</h2><table>
            <tr><th>Code</th><th>Signups</th><th>Free</th><th>Premium</th><th>Est. Commission</th></tr>
            ${refs.map(([c,d])=>`<tr><td><strong>${c}</strong></td><td>${d.total}</td><td>${d.free}</td><td>${d.premium}</td><td>HKD ${Math.round(d.premium*598*.2).toLocaleString()}</td></tr>`).join("")}
          </table></div>`:""}
          <div class="section"><h2>Users (${f.length})</h2>
            <input class="search-input" id="user-search" placeholder="Search name, email, referral..." value="${q}" oninput="render()"/>
            <div style="overflow-x:auto"><table>
              <tr><th>Name</th><th>Email</th><th>Signed up</th><th>Last active</th><th>Lang</th><th>Status</th><th>Promo</th><th>Referred by</th></tr>
              ${f.sort((a,b)=>(b.createdAt?.toDate?.()?.getTime?.()||0)-(a.createdAt?.toDate?.()?.getTime?.()||0)).map(u=>{
                const cr=u.createdAt?.toDate?.()?.toLocaleDateString?.("en-GB",{day:"numeric",month:"short",year:"numeric"})||"—";
                const la=u.lastActiveAt?.toDate?.()?.toLocaleDateString?.("en-GB",{day:"numeric",month:"short"})||"—";
                return`<tr><td>${u.displayName||"—"}</td><td>${u.email||"—"}</td><td>${cr}</td><td>${la}</td><td>${u.selectedLanguage==="mandarin"?"🇨🇳":"🇭🇰"}</td><td><span class="badge ${u.isPremium?"badge-premium":"badge-free"}">${u.isPremium?"Premium":"Free"}</span></td><td>${u.promoCodeUsed||"—"}</td><td>${u.referredBy||"—"}</td></tr>`;
              }).join("")}
            </table></div>
          </div>
          <div class="section"><h2>Promo Codes</h2><table>
            <tr><th>Code</th><th>Description</th><th>Status</th><th>Action</th></tr>
            ${codes.map((c,i)=>`<tr><td><strong>${c.code}</strong></td><td>${c.description||"—"}</td><td><span class="badge ${c.active?"badge-premium":"badge-free"}">${c.active?"Active":"Inactive"}</span></td><td><button class="toggle ${c.active?"active":"inactive"}" onclick="toggleCode(${i})">${c.active?"Deactivate":"Activate"}</button></td></tr>`).join("")}
          </table>
          <div class="add-code"><input id="new-code" placeholder="New code"/><input id="new-desc" placeholder="Description"/><button onclick="addCode()">Add</button></div>
          </div>
        </div>`;
      }
      window.render=render;
      window.toggleCode=async(i)=>{codes[i].active=!codes[i].active;await db.collection("config").doc("promoCodes").set({codes});render();};
      window.addCode=async()=>{const c=document.getElementById("new-code").value.trim().toUpperCase(),d=document.getElementById("new-desc").value.trim();if(!c)return;codes.push({code:c,active:true,description:d||c});await db.collection("config").doc("promoCodes").set({codes});render();};
      render();
    }
    if(authed)loadDashboard();else showLogin();
  </script>
</body>
</html>
